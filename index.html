<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Gravity</title>
</head>

<body>
    <div id="container">
        <div id="canvascontainer">
            <canvas id="canvas" width="800px" height="600px"></canvas>
        </div>

        <div id="tools">
            <select id="focus" class="tooloptions">
                <option value="none">None</option>
            </select>

            <div class="tooloptions">
                <input type="checkbox" class="checkbox" id="shownames" value="shownames" checked>
                <label for="shownames" class="text">Show Name</label>
            </div>
        
            <p id="debug">text</p>
        </div>

        <div id="lowerLeftButtons">
            <button id="resetView">Reset View</button>
        </div>

        <div id="lowerRightButtons">
            <button id="reverse">Reverse</button>
            <button id="backward">&lt &lt</button>
            <button id="pause">⏸︎</button>
            <button id="forward">&gt &gt</button>
        </div>

        <div id="upperRightButtons">
            <button id="clearAll">Clear All</button>
        </div>
    </div>

    <script defer src="physics.js"></script>
    <script defer src="view.js"></script>
    <script defer src="script.js"></script>

</body>
</html>
