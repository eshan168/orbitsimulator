<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Gravity</title>
</head>

<body>
    <div id="container">
        <div id="canvascontainer">
            <canvas id="canvas" width="800px" height="600px"></canvas>
        </div>

        <div id="tools">

            <!-- Focus Section -->
            <div class="toolSection">
                <label class="sectionLabel">Focus</label>

                <select id="focus" class="tooloptions">
                    <option value="none">None</option>
                </select>

                <div class="tooloptions">
                    <input type="checkbox" class="checkbox" id="shownames" value="shownames" checked>
                    <label for="shownames" class="text">Show Name</label>
                </div>
            </div>

            <!-- Create Body Section -->
            <div class="toolSection">
                <label class="sectionLabel">Create Body</label>

                <select id="bodyType" class="tooloptions">
                    <option value="star">Star</option>
                    <option value="gas">Gas Body</option>
                    <option value="rocky">Rocky Body</option>
                </select>

                <input type="number" id="massInput" class="tooloptions inputField" placeholder="Mass">

                <button id="createBody" class="tooloptions">Create</button>
            </div>

            <!-- Modify Section -->
            <div class="toolSection">
                <label class="sectionLabel">Modify</label>

                <!-- YOUR EXISTING MODIFY DROPDOWN -->
                <select id="modify" class="tooloptions">
                    <option value="none">None</option>
                </select>

                <div class="inputRow">
                    <label class="text">Xpos</label>
                    <input type="number" id="xpos" class="inputField">
                </div>

                <div class="inputRow">
                    <label class="text">Ypos</label>
                    <input type="number" id="ypos" class="inputField">
                </div>

                <div class="inputRow">
                    <label class="text">Xvel</label>
                    <input type="number" id="xvel" class="inputField">
                </div>

                <div class="inputRow">
                    <label class="text">Yvel</label>
                    <input type="number" id="yvel" class="inputField">
                </div>

                <button id="deleteBody" class="tooloptions">Delete Body</button>
                <button id="deleteTrail" class="tooloptions">Delete Trail</button>
            </div>

            <p id="debug">text</p>

        </div>

        <div id="lowerLeftButtons">
            <button id="resetView">Reset View</button>
        </div>

        <div id="lowerRightButtons">
            <button id="reverse">Reverse</button>
            <button id="backward">&lt &lt</button>
            <button id="pause">⏸︎</button>
            <button id="forward">&gt &gt</button>
        </div>

        <div id="upperRightButtons">
            <button id="clearAll">Clear All</button>
        </div>
    </div>

    <script defer src="physics.js"></script>
    <script defer src="view.js"></script>
    <script defer src="script.js"></script>

</body>
</html>
